# ============================================================================
# OmniNova Claw Configuration
# Copy to ~/.omninova/config.toml and edit to your needs.
# All fields have sensible defaults – only uncomment what you want to change.
# Environment variables (OMNINOVA_*) override values in this file.
# ============================================================================

# --- Core API ---
# api_key = "sk-..."
# api_url = "https://ark.cn-beijing.volces.com/api/v3"
# default_provider = "doubao"
# default_model = "doubao-seed-2-0-pro-260215"
# default_temperature = 0.7

# Provider API mode: "chat", "completion", or "responses"
# provider_api = "chat"

# --- Named Model Providers ---
# [model_providers.openai]
# api_key_env = "OPENAI_API_KEY"
# base_url = "https://api.openai.com/v1"
# default_model = "gpt-5"
# models = ["gpt-5", "gpt-5-mini", "gpt-4.1", "gpt-4o", "o3"]
# enabled = true
#
# [model_providers.gemini]
# api_key_env = "GEMINI_API_KEY"
# base_url = "https://generativelanguage.googleapis.com"
# default_model = "gemini-2.5-pro"
# models = ["gemini-2.5-pro", "gemini-2.5-flash", "gemini-2.0-flash"]
# enabled = true
#
# [model_providers.deepseek]
# api_key_env = "DEEPSEEK_API_KEY"
# base_url = "https://api.deepseek.com"
# default_model = "deepseek-chat"
# models = ["deepseek-chat", "deepseek-reasoner", "deepseek-r1"]
# enabled = true
#
# [model_providers.qwen]
# api_key_env = "DASHSCOPE_API_KEY"
# base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
# default_model = "qwen-max"
# models = ["qwen-max", "qwen-plus", "qwen2.5-72b-instruct"]
# enabled = true
#
# [model_providers.ollama]
# base_url = "http://localhost:11434"
# default_model = "llama3.2"
# models = ["llama3.2", "qwen2.5", "deepseek-r1", "mistral"]
# enabled = true
#
# [model_providers.anthropic]
# api_key_env = "ANTHROPIC_API_KEY"
# base_url = "https://api.anthropic.com"
# default_model = "claude-sonnet-4-20250514"
# models = ["claude-sonnet-4-20250514", "claude-opus-4-20250514", "claude-3-7-sonnet-latest"]
# enabled = true

# --- Provider Behavior ---
# [provider]
# reasoning_level = "medium"   # minimal, low, medium, high, xhigh

# --- Agent ---
# [agent]
# name = "omninova"
# system_prompt = "You are a helpful AI assistant."
# compact_context = true
# max_tool_iterations = 20
# max_history_messages = 50
# parallel_tools = false

# --- Delegate Agents ---
# [agents.researcher]
# provider = "openrouter"
# model = "anthropic/claude-sonnet-4-20250514"
# system_prompt = "You are a research assistant."
# max_depth = 2
# agentic = true
# allowed_tools = ["web_search", "http_request", "file_read"]
# max_iterations = 8

# --- Skills ---
# [skills]
# open_skills_enabled = true
# open_skills_dir = "~/.omninova/skills"
# prompt_injection_mode = "full"

# --- Autonomy ---
# [autonomy]
# level = "supervised"          # supervised, semi, autonomous
# workspace_only = true
# allowed_commands = ["git", "npm", "cargo", "ls", "cat", "grep", "find", "echo", "pwd"]
# forbidden_paths = ["/etc", "/root", "~/.ssh", "~/.aws"]
# max_actions_per_hour = 20
# max_cost_per_day_cents = 500
# require_approval_for_medium_risk = true
# block_high_risk_commands = true
# auto_approve = ["file_read", "memory_recall"]

# --- Security ---
# [security.otp]
# enabled = false
# method = "totp"
# gated_actions = []
#
# [security.estop]
# enabled = true
# require_otp_to_resume = false
#
# [security.syscall_anomaly]
# enabled = false
# strict_mode = false
#
# [security.sandbox]
# enabled = false
#
# [security.audit]
# enabled = false

# --- Runtime ---
# [runtime]
# kind = "native"               # native, docker, wasm
# reasoning_enabled = false
# reasoning_level = "medium"
#
# [runtime.wasm]
# tools_dir = "tools/wasm"
# fuel_limit = 2000000
# memory_limit_mb = 128
# max_module_size_mb = 64
# allow_workspace_read = true
# allow_workspace_write = true
# allowed_hosts = ["localhost:3000"]
#
# [runtime.wasm.security]
# require_workspace_relative_tools_dir = true
# reject_symlink_modules = true
# strict_host_validation = true
# capability_escalation_mode = "clamp"   # clamp, deny
# module_hash_policy = "warn"            # warn, enforce, ignore

# --- Memory ---
# [memory]
# backend = "sqlite"            # sqlite, markdown, none
# db_path = "~/.omninova/memory.db"
# search_expand_query = true
# search_recency_weight = 2.0
# search_recency_half_life_days = 7.0
#
# [memory.embedding]
# provider = "openai"
# model = "text-embedding-3-small"

# --- Storage ---
# [storage.provider.config]
# provider = "sqlite"
# db_url = "sqlite:~/.omninova/storage.db"

# --- Gateway ---
# [gateway]
# host = "127.0.0.1"
# port = 10809
# require_pairing = true
# allow_public_bind = false
# session_ttl_secs = 86400
# max_sessions = 500
# webhook_require_nonce = false
# webhook_max_skew_secs = 300
# webhook_nonce_ttl_secs = 600
# webhook_signature_algorithms = ["sha256", "v1", "v0", "raw"]
# webhook_signature_priority = ["v1", "sha256", "v0", "raw"]
# webhook_signature_strict_priority = false
# webhook_signing_include_timestamp = false
# webhook_signing_require_timestamp = false

# --- Proxy ---
# [proxy]
# enabled = false
# scope = "all"
# services = ["provider.*", "tool.*"]
# http_proxy = "http://proxy:3128"
# https_proxy = "http://proxy:3128"
# no_proxy = "localhost,127.0.0.1"

# --- Tunnel ---
# [tunnel]
# enabled = false
# provider = "ngrok"
# auth_token = "..."

# --- Browser Tool ---
# [browser]
# enabled = false
# backend = "playwright"
# native_headless = false
# attach_only = false
# cdp_url = "http://127.0.0.1:9222"
# allowed_domains = []

# --- HTTP Request Tool ---
# [http_request]
# enabled = false
# allowed_domains = []
# max_response_size = 1048576
# timeout_secs = 30

# --- Web Fetch Tool ---
# [web_fetch]
# enabled = false
# allowed_domains = []
# max_response_size = 1048576
# timeout_secs = 30

# --- Web Search Tool ---
# [web_search]
# enabled = false
# provider = "brave"
# brave_api_key = "..."
# max_results = 10
# timeout_secs = 15

# --- Composio ---
# [composio]
# enabled = false
# api_key = "..."
# entity_id = "default"

# --- Skills ---
# [skills]
# open_skills_enabled = false
# open_skills_dir = "~/.omninova/skills"

# --- Reliability ---
# [reliability]
# max_retries = 3
# retry_backoff_ms = 1000
# circuit_breaker_enabled = false

# --- Cost ---
# [cost]
# tracking_enabled = false
# max_daily_cents = 500
# alert_threshold_cents = 400

# --- Channels ---
# Supported: WhatsApp (Baileys), Telegram (grammY), Slack (Bolt), Discord (discord.js),
#   Google Chat, Signal (signal-cli), BlueBubbles (iMessage), iMessage (legacy), IRC,
#   Microsoft Teams, Matrix, Feishu, LINE, Mattermost, Nextcloud Talk, Nostr,
#   Synology Chat, Tlon, Twitch, WeChat, Zalo, Zalo Personal, Lark, 钉钉 (DingTalk), WebChat, Email, Webhook
#
# [channels_config.telegram]
# enabled = false
# token_env = "TELEGRAM_BOT_TOKEN"
#
# [channels_config.discord]
# enabled = false
# token_env = "DISCORD_TOKEN"
#
# [channels_config.slack]
# enabled = false
# token_env = "SLACK_TOKEN"
#
# [channels_config.whatsapp]
# enabled = false
# token_env = "WHATSAPP_CREDENTIALS_PATH"
#
# [channels_config.google_chat]
# enabled = false
# token_env = "GOOGLE_CHAT_CREDENTIALS"
#
# [channels_config.signal]
# enabled = false
# token_env = "SIGNAL_CLI_CONFIG"
#
# [channels_config.bluebubbles]
# enabled = false
# extra = { server_url = "...", webhook_path = "..." }
#
# [channels_config.imessage]
# enabled = false
#
# [channels_config.irc]
# enabled = false
# extra = { server = "...", nick = "..." }
#
# [channels_config.msteams]
