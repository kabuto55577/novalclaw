# --- Observability ---
# [observability]
# log_level = "info"
# prometheus_enabled = false
# prometheus_port = 9090
# tracing_enabled = false

# --- Heartbeat ---
# [heartbeat]
# enabled = false
# interval_secs = 60

# --- Cron ---
# [cron]
# enabled = false
# [[cron.jobs]]
# name = "daily_summary"
# schedule = "0 9 * * *"
# action = "Generate a daily summary"

# --- Goal Loop ---
# [goal_loop]
# enabled = false
# interval_secs = 300

# --- Identity ---
# [identity]
# name = "OmniNova"
# bio = "An AI assistant powered by OmniNova Claw."

# --- Multimodal ---
# [multimodal]
# vision_enabled = false
# audio_enabled = false
# desktop_vision_enabled = false
# desktop_vision_max_dimension_px = 1280

# --- Transcription ---
# [transcription]
# enabled = false
# provider = "whisper"
# model = "base"

# --- Hooks ---
# [hooks]
# on_start = []
# on_message = []
# on_tool_call = []
# on_error = []

# --- Hardware ---
# [hardware]
# platform = "rpi"
# gpio_enabled = false
#
# [peripherals.stm32]
# serial_port = "/dev/ttyUSB0"
# baud_rate = 115200

# --- Robot ---
# [robot]
# [robot.drive]
# backend = "mock"
# max_speed = 0.5
# max_rotation = 1.0
#
# [robot.camera]
# device = "/dev/video0"
# width = 640
# height = 480
#
# [robot.safety]
# min_obstacle_distance = 0.3
# slow_zone_multiplier = 3.0

# --- Model Routes ---
# [[model_routes]]
# hint = "code"
# provider = "anthropic"
# model = "claude-sonnet-4-20250514"
#
# [[model_routes]]
# hint = "fast"
# provider = "openai"
# model = "gpt-4o-mini"

